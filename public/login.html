<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – MEDI SYNC</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header><div class="header-brand"><div class="cross-icon">✚</div>MEDI SYNC</div></header>
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="contact.html">Contact</a>
    <a href="login.html" class="active">Login</a>
    <a href="signup.html">Sign Up</a>
  </nav>
  <div class="page-wrap">
    <div class="container" style="max-width:460px;">
      <h2>Welcome Back</h2>
      <p class="subtitle">Log in to access your MEDI SYNC account</p>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="loginEmail">Email Address</label>
          <div class="input-icon-wrap">
            <span class="icon">✉️</span>
            <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
          </div>
          <div class="error" id="emailErr"></div>
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <div class="input-icon-wrap">
            <span class="icon">🔒</span>
            <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password">
            <button type="button" class="toggle-pw" onclick="togglePassword('loginPassword', this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1rem;width:auto;padding:0;margin:0;color:var(--gray-500);">👁️</button>
          </div>
          <div class="error" id="pwErr"></div>
        </div>
        <div style="display:flex;justify-content:flex-end;margin-bottom:20px;">
          <a href="#" style="font-size:0.85rem;color:var(--green-mid);text-decoration:none;">Forgot password?</a>
        </div>
        <button type="submit" class="btn-primary" id="loginBtn">Log In</button>
      </form>

      <div class="divider">or</div>
      <p class="auth-link">Don't have an account? <a href="signup.html">Sign Up</a></p>
    </div>
  </div>
  <footer><p>&copy; 2024 <strong>Medi Sync</strong>. All Rights Reserved.</p></footer>
  <div class="success-toast" id="toast">✅ Login successful! Redirecting…</div>
  <script src="script.js"></script>
</body>
</html>
