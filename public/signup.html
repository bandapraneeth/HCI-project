<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up – MEDI SYNC</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header><div class="header-brand"><div class="cross-icon">✚</div>MEDI SYNC</div></header>
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="contact.html">Contact</a>
    <a href="login.html">Login</a>
    <a href="signup.html" class="active">Sign Up</a>
  </nav>
  <div class="page-wrap">
    <div class="container" style="max-width:480px;">
      <h2>Create Account</h2>
      <p class="subtitle">Join MEDI SYNC for seamless healthcare management</p>

      <form id="signupForm" novalidate>
        <div class="form-group">
          <label for="signupName">Full Name</label>
          <div class="input-icon-wrap">
            <span class="icon">👤</span>
            <input type="text" id="signupName" placeholder="John Doe" autocomplete="name">
          </div>
          <div class="error" id="nameErr"></div>
        </div>
        <div class="form-group">
          <label for="signupPhone">Phone Number</label>
          <div class="input-icon-wrap">
            <span class="icon">📞</span>
            <input type="tel" id="signupPhone" placeholder="+91 98765 43210">
          </div>
          <div class="error" id="phoneErr"></div>
        </div>
        <div class="form-group">
          <label for="signupEmail">Email Address</label>
          <div class="input-icon-wrap">
            <span class="icon">✉️</span>
            <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email">
          </div>
          <div class="error" id="emailErr"></div>
        </div>
        <div class="form-group">
          <label for="signupPassword">Password</label>
          <div class="input-icon-wrap">
            <span class="icon">🔒</span>
            <input type="password" id="signupPassword" placeholder="Min. 8 characters">
            <button type="button" onclick="togglePassword('signupPassword', this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1rem;width:auto;padding:0;margin:0;color:var(--gray-500);">👁️</button>
          </div>
          <div class="pw-strength" id="pwStrength" style="margin-top:6px;"></div>
          <div class="error" id="pwErr"></div>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="input-icon-wrap">
            <span class="icon">🔒</span>
            <input type="password" id="confirmPassword" placeholder="Re-enter password">
          </div>
          <div class="error" id="confirmErr"></div>
        </div>
        <div class="form-group" style="display:flex;align-items:flex-start;gap:10px;">
          <input type="checkbox" id="terms" style="width:auto;margin-top:3px;accent-color:var(--green-light);">
          <label for="terms" style="text-transform:none;font-size:0.85rem;color:var(--gray-500);font-weight:400;">I agree to the <a href="#" style="color:var(--green-mid);">Terms of Service</a> and <a href="#" style="color:var(--green-mid);">Privacy Policy</a></label>
        </div>
        <div class="error" id="termsErr"></div>
        <button type="submit" class="btn-primary" id="signupBtn">Create Account</button>
      </form>

      <div class="divider">or</div>
      <p class="auth-link">Already have an account? <a href="login.html">Log In</a></p>
    </div>
  </div>
  <footer><p>&copy; 2024 <strong>Medi Sync</strong>. All Rights Reserved.</p></footer>
  <div class="success-toast" id="toast">🎉 Account created! Redirecting to login…</div>
  <script src="script.js"></script>
</body>
</html>
